      - id: "12.8"
        title: Bounded process parallelism for CAD jobs
        priority: P0
        implementation_complexity: Medium
        debugging_difficulty: High
        recommendation: Build now
        status: implemented
        stable: false
        source_document: specs/useful-implementation-optimization.md
        notes: Object validation uses configurable bounded isolated worker processes with deterministic result ordering, timeout handling, and explicit failure records. Geometry-label worker pools are intentionally deferred because current in-process shape reuse plus persistent label caching is sufficient for MVP and parallel OpenCASCADE labeling adds stability and memory risk.
