        notes: Implemented prediction-side IntersectionEdit failure categories in `failure_case_analysis`, including invalid output, correct direction but wrong distance, wrong direction, excessive movement, insufficient movement, unresolved target clearance, centroid-distance error, non-minimal valid edit, wrong candidate, and candidate ranking error. Geometry-executed categories such as cavity AABB failures, rotation errors, movable-object errors, and multi-fixed-object failures remain planned for future verifier-backed tasks.
