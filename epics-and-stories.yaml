      - id: "6.4"
        title: Topology-held-out split
        priority: P2
        implementation_complexity: Medium
        debugging_difficulty: Medium
        recommendation: Defer
        status: implemented
        stable: true
        notes:
          - Implemented as an extension split that is written only when rows are assigned to test_topology_heldout; the frozen default v0.1 six-split export remains unchanged when no extension rows exist.
          - CADEvolve source loading derives lightweight topology tags from source paths, code markers, and CadQuery operation signatures, and geometry/public rows propagate those tags for split assignment and audit metadata.
      - id: "6.5"
        title: Operation-held-out split
        priority: P2
        implementation_complexity: Medium
        debugging_difficulty: Medium
        recommendation: Defer
        status: implemented
        stable: true
        notes:
          - Implemented as an extension split that is written only when rows are assigned to test_operation_heldout; validation, parquet export, balancing, split redistribution, and sharded merge now preserve optional extension split rows.
          - CadQuery operation signatures are propagated from source objects into geometry and public row metadata so selected held-out operations are absent from train rows under the group split policy.
      - id: "6.6"
        title: Near-boundary hard split
        priority: P0
        implementation_complexity: Medium
        debugging_difficulty: Medium
        recommendation: Build now
        status: implemented
        stable: true
        notes:
          - Near-boundary and counterfactual groups are now distributed by a deterministic group-level policy instead of being routed wholesale to test_near_boundary.
          - The target boundary-group policy keeps test_near_boundary as a small 5-10% challenge slice while moving most hard examples into train and validation.
      - id: "6.7"
        title: Class balancing
        priority: P0
        implementation_complexity: Medium
        debugging_difficulty: Medium
        recommendation: Build now
        status: implemented
        stable: true
        notes:
          - Deterministic post-materialization class balancing is wired into smoke and release-candidate exports by default.
          - Whole geometry groups are downsampled toward the v0.1 relation target where all target classes exist.
          - Pairwise answers are capped to equal A/B/both/neither counts.
          - Sparse or missing target classes are reported in class_balance_report.json rather than treated as balanced.

