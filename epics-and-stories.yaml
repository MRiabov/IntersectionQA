status_definitions:
  planned: Specified, but no concrete implementation or completed artifact is present yet.
  work-in-progress: Partially specified or partially built, with remaining acceptance criteria open.
  implemented: A concrete artifact exists for the story, but it is not necessarily final-pipeline verified.
stable_definition: true only after the feature has been confirmed to work in the final dataset pipeline.
ordering:
  source: implementation-complexity-priority-matrix.md
  rule: Epics and stories follow the matrix order; priority, complexity, recommendation, and MVP notes are copied from that matrix.
current_snapshot:
  date: "2026-04-26"
  codebase_state: MVP vertical slice is implemented for schema/config, CadQuery-backed object validation and exact smoke geometry, prompt generation, JSONL export/validation, grouped splits, AABB diagnostics, metrics, and smoke dataset scripts. CADEvolve object ingestion is available from a local tar archive, and the smoke pipeline now generates CADEvolve-derived public task rows through bbox-guided two-object assemblies with exact CadQuery/OpenCASCADE labels. Synthetic fixtures remain fallback/golden rows only. Recent hardening fixes deterministic sorted CADEvolve member selection, isolated-worker result retrieval, cached-shape mutation, AABB-disjoint Boolean short-circuiting, label-consistency rejection for impossible overlap/touching states, optional topology/operation held-out split routing from stored metadata, and release-gated exact verification for IntersectionEdit repair rows. CADEvolve gap placement now cycles object-pair placements across all six signed axes so new repair-direction/translation rows can include negative as well as positive directions. A fresh CADEvolve smoke sample has been rendered and manually checked. IntersectionEdit now includes opt-in `repair_direction`, `repair_translation`, target-clearance movement, target-contact movement, and centroid-distance movement rows in a validated fast GRPO pilot release candidate. Exact axis-aligned repair and candidate rows are implemented and the label search has been sped up by caching shape context plus avoiding repeated CAD Boolean calls inside search predicates, but the exact family is still not included in the overnight CADEvolve training build. Repair/movement materialization now reuses stored AABBs/volumes and AABB-disjoint centroid certificates, and release reports avoid redundant CAD replay for label-derived metrics, OBB local boxes, and conservative repair certificates. A fresh balanced release candidate has 2,821 rows from 500 geometries and all six repair directions, with group-safe task/answer-balanced internal RL splits. Qwen3.5 4B GRPO canary infrastructure ran on Vast A100 with saved checkpoint artifacts; format-scaffold rewards fixed parse-invalid completions. Task-stratified and task-answer-stratified capped sampling fixed rare-family coverage for canaries, but balanced-data GRPO still fails repair/movement tasks, so the 300-step pilot remains stopped until the learning signal changes. The reasoning-bootstrap path now has internal tagged-reasoning SFT rows, SFT runners that train on `target_text` while preserving canonical answers, and GRPO adapter initialization from an SFT LoRA. A 20-step SFT bootstrap plus 20-step GRPO-from-adapter A100 canary was preserved, but numeric repair/movement tasks still failed. Conservative edit rewards now include candidate-aware repair-direction credit, direction/coarse/fine repair-translation credit, and coarse signed-distance movement credit; a 10-step H100 shaped-reward canary improved reward density but still produced `0.0` exact repair/movement quality. GRPO/SFT runners now support opt-in edit-geometry prompt features for training canaries, exposing trusted AABBs, initial state, targets, and allowed edit directions without changing public dataset prompts. A 10-step H100 feature-exposure GRPO canary improved internal eval reward to `0.5509` and quality reward to `0.5899`, with exact signal on centroid-distance move, repair direction, and target contact, but repair translation and target-clearance movement remained unsolved. Bare one-decimal signed-distance outputs now receive penalized reward-only semantic credit, so target-movement rows are less all-or-nothing while strict public parsing remains canonical. A bounded continuation from the feature checkpoint reached best quality reward `0.7303` and internal eval reward `0.5716` at step 20, improving target-clearance and target-contact movement, but step 30 regressed and repair translation stayed `0.0` exact. The 300-step pilot remains stopped pending a repair-translation-focused curriculum or prompt/reward change.
