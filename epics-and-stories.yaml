      - id: "15.21"
        title: IntersectionEdit SFT and GRPO training plan
        track: intersectionedit
        priority: P1
        implementation_complexity: High
        debugging_difficulty: High
        recommendation: Build after supervised labels
        status: implemented
        stable: true
        source_document: specs/intersectionedit-full-spec.md
        notes: >-
          Added GRPO reward architecture by replacing the smoke script's exact string reward
          with row-aware rewards that score exact repair, full-vector/edit-program repair,
          target-clearance/contact/centroid movement, candidate-selection, and
          candidate-ranking rows. Added `scripts.prepare_intersectionedit_training_splits`
          for edit-row filtering plus group-safe inner train/eval splits, updated the GRPO
          smoke loader to consume `inner_train`/`inner_eval`, and documented staged
          IntersectionEdit SFT/GRPO commands in `docs/text_finetune_runbook.md`. Added
          `scripts/text_grpo_train_unsloth.py` for the production Qwen3.5 4B run, with
          GSPO-style sequence importance sampling, Dr. GRPO/DAPO loss selection, periodic
          generation-quality eval, JSONL metrics, and adapter saving. The runner now uses
          the underlying text tokenizer for both quality generation and GRPOTrainer
          processing instead of the Qwen processor. Added format-scaffold rewards,
          stricter tagged-answer instructions, cheaper quality-eval defaults, sample
          generation logging, and a compatibility shim for TRL/transformers stacks that
          expect `warnings_issued` on the wrapped model. The first validated pilot uses
          `data/intersectionedit_grpo_pilot_inner_all` for mixed QA+Edit RL. Vast A100
          canaries saved checkpoints at steps 10 and 50. The format canary reduced
          parse-invalid completions to `0.0`, but the 50-step continuation still only
          solved tolerance-fit and part of relation classification while repair, movement,
          volume, and bucket rows stayed wrong. The next capped canary path now uses
          task-stratified row sampling and failure-focused quality samples so rare edit
          families are represented under small train/eval caps. A stratified A100 retry
          covered every task family under 128-row/32-row caps and saved
          `checkpoint-50` plus a final adapter, but final internal eval reward was only
          `0.3191` and failure-focused samples still showed wrong repair direction,
          repair translation, movement distance, and volume-bucket answers. The runner now
          writes a final quality record after `trainer.train()` when the periodic callback
          misses the final step after resume. Capped GRPO row selection now supports
          hierarchical task-then-answer stratification, which spreads available labels
          and magnitudes within each task while preserving task coverage. CADEvolve
          bbox-guided gap placement now cycles through all six signed axes and records
          placement direction metadata; a 200-geometry repair-only probe produced all six
          repair-direction labels for newly generated rows. The balanced release candidate
          `data/intersectionedit_grpo_pilot_balanced` has 2,821 rows from 500 geometries
          and all six repair directions, and the balanced internal RL split has 1,956
          train rows and 217 eval rows. A 20-step Vast A100 canary saved
          `data/training_artifacts/grpo_qwen3p5_4b_intersectionqa_edit_balanced_canary20`
          with final eval reward `0.2646` and final quality reward `0.3678`; repair and
          movement exact accuracy remained `0.0`, so the 300-step pilot remains stopped
          until the prompt, reward shaping, or supervised/bootstrap data changes the
          learning signal for those families. The supervised/bootstrap path now has
          `data/intersectionedit_grpo_pilot_balanced_reasoning_sft`, which preserves
          canonical `answer` fields and writes tagged reasoning completions to
          `target_text` for 1,956 train rows and 217 eval rows; SFT runners consume
          `target_text` when present, and the GRPO runner can initialize from the
          resulting LoRA adapter via `--adapter-init-dir`. A 20-step A100 SFT
          bootstrap saved an adapter with train loss `1.1380`; the follow-up 20-step
          GRPO-from-adapter canary saved artifacts under
          `data/training_artifacts/qwen3p5_4b_intersectionqa_edit_reasoning_bootstrap`
          with final internal eval reward `0.3348` and final quality reward `0.3249`.
          Repair direction improved to `0.5` accuracy on the tiny quality sample, but
          repair translation and movement families stayed at `0.0`, so this adapter
          also does not justify a 300-step pilot. A follow-up shaped-reward H100
          canary used the same balanced internal split with candidate-aware repair
          direction, direction/coarse/fine repair-translation, and coarse signed-distance
          movement rewards. The 10-step run saved
          `data/training_artifacts/qwen3p5_4b_intersectionqa_edit_shaped_reward_canary10/shaped_reward_canary10_artifacts.tar.gz`,
          reached train reward `0.3365`, internal eval reward `0.3486`, and quality
          reward `0.3826`, but repair direction, repair translation, centroid movement,
          target clearance, and target contact remained `0.0` exact. The 300-step pilot
          remains stopped until the next run changes feature exposure or curriculum, not
          just reward shaping. Added opt-in `--prompt-feature-mode edit_geometry` for GRPO
          and Unsloth SFT canaries so training/eval prompts can include trusted AABBs,
          initial state, targets, and allowed edit directions while public dataset prompts
          stay unchanged. A 10-step H100 feature-exposure canary saved
          `data/training_artifacts/qwen3p5_4b_intersectionqa_edit_feature_canary10/feature_canary10_artifacts.tar.gz`,
          reached train reward `0.4358`, internal eval reward `0.5509`, train loss
          `0.0913`, and quality reward `0.5899`. The tiny quality probe reached
          centroid-distance move `1.0`, repair direction `0.5`, and target contact
          `0.5` exact, but repair translation and target-clearance movement stayed
          `0.0`, so the next step is a bounded continuation/curriculum check rather
          than a 300-step pilot. Feature-canary failures also showed target-movement
          completions with bare signed numbers such as `<answer>-1.5</answer>`; the
          reward path now gives these outputs penalized semantic credit while keeping
          strict public parsing and full reward tied to `distance_mm=<one decimal>`.
          A bounded continuation from the feature checkpoint with this lenient reward
          saved
          `data/training_artifacts/qwen3p5_4b_intersectionqa_edit_feature_lenient_continue30/feature_lenient_continue30_artifacts.tar.gz`;
          checkpoint-20 was best with train reward `0.7519`, internal eval reward
          `0.5716`, and quality reward `0.7303`. Target-clearance movement improved
          to `0.5` exact and target-contact movement to `1.0` exact on the tiny
          quality probe, but repair translation remained `0.0` exact and step 30
          regressed to internal eval reward `0.4412`, so the 300-step pilot remains
          stopped pending a repair-translation-focused curriculum or prompt/reward
          change.
      - id: "15.22"
        title: IntersectionEdit failure-mode analysis
        track: intersectionedit
        priority: P1
        implementation_complexity: Medium
        debugging_difficulty: Medium
        recommendation: Build after evaluation metrics
        status: implemented
        stable: false
