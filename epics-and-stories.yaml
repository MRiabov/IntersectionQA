status_definitions:
  planned: Specified, but no concrete implementation or completed artifact is present yet.
  work-in-progress: Partially specified or partially built, with remaining acceptance criteria open.
  implemented: A concrete artifact exists for the story, but it is not necessarily final-pipeline verified.
stable_definition: true only after the feature has been confirmed to work in the final dataset pipeline.
ordering:
  source: implementation-complexity-priority-matrix.md
  rule: Epics and stories follow the matrix order; priority, complexity, recommendation, and MVP notes are copied from that matrix.
current_snapshot:
  date: "2026-04-25"
  codebase_state: MVP vertical slice is implemented for schema/config, CadQuery-backed object validation and exact smoke geometry, prompt generation, JSONL export/validation, grouped splits, AABB diagnostics, metrics, and smoke dataset scripts. CADEvolve object ingestion is available from a local tar archive, and the smoke pipeline now generates CADEvolve-derived public task rows through bbox-guided two-object assemblies with exact CadQuery/OpenCASCADE labels. Synthetic fixtures remain fallback/golden rows only. Recent hardening fixes deterministic sorted CADEvolve member selection, isolated-worker result retrieval, cached-shape mutation, AABB-disjoint Boolean short-circuiting, label-consistency rejection for impossible overlap/touching states, optional topology/operation held-out split routing from stored metadata, and release-gated exact verification for IntersectionEdit repair rows. A fresh CADEvolve smoke sample has been rendered and manually checked. IntersectionEdit now includes opt-in `repair_direction` and `repair_translation` rows using a conservative AABB-separating translation policy.
  stable_features:
    - package_structure
    - pydantic_schema_models
    - config_and_logging_primitives
    - synthetic_smoke_fixtures
    - cadquery_object_validation
    - exact_cadquery_pair_measurement
    - cadevolve_bbox_guided_assembly_generation
    - cadevolve_public_task_generation
    - generation_progress_timing_logs
    - in_process_shape_reuse_for_candidate_generation
    - object_validation_cache
    - geometry_label_cache
    - deterministic_cadevolve_member_selection
    - cadevolve_member_index_cache
    - isolated_worker_queue_result_read
    - bounded_parallel_object_validation
    - cached_shape_mutation_guard
    - cadquery_label_consistency_hardening
    - content_stable_config_hash
    - reproducibility_audit_cli
    - sharded_resumable_generation
    - row_debug_step_artifact_export
    - pyvista_row_rendering
    - render_audited_cadevolve_smoke_sample
    - cadevolve_cavity_targeted_examples
    - counterfactual_pairwise_and_ranking_prompt_formats
    - clearance_bucket_prompt_generation
    - tolerance_fit_prompt_generation
    - mvp_prompt_generation
    - jsonl_export_and_validation
    - group_safe_splits
    - topology_and_operation_extension_splits
    - aabb_diagnostic_baseline
    - obb_diagnostic_baseline
    - split_safe_few_shot_evaluation
    - tool_assisted_exact_verifier_upper_bound
    - intersectionedit_repair_direction_aabb_slice
    - intersectionedit_repair_translation_aabb_slice
    - intersectionedit_release_gated_exact_repair_verifier
    - intersectionedit_repair_prediction_verifier_cli
